services:
  postgres:
    image: postgres:18
    container_name: varlens-postgres-dev
    restart: unless-stopped
    ports:
      - '127.0.0.1:${VARLENS_PG_PORT}:5432'
    env_file:
      - .env.postgres.local
    volumes:
      - varlens_postgres_data:/var/lib/postgresql
      - ./scripts/postgres/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  varlens_postgres_data:
