<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>VarLens — Sign in</title>
    <style>
      /* "Clinical Slate" — same palette as src/renderer/src/plugins/vuetify.ts.
       Inlined so the login wall ships zero JS/CSS bundles to anonymous users. */
      :root {
        --primary: #1e3a5f;
        --primary-hover: #16304f;
        --secondary: #455a64;
        --surface: #fafbfd;
        --surface-variant: #ecf0f4;
        --background: #f0f4f8;
        --on-surface: #1a1d23;
        --on-surface-muted: #5a6470;
        --on-primary: #ffffff;
        --error: #b71c1c;
        --error-bg: #fdeded;
        --info: #1565c0;
        --info-bg: #e8f1fb;
        --border: #d9e0e8;
        --border-strong: #b8c2ce;
        --shadow: 0 1px 2px rgba(26, 29, 35, 0.04), 0 4px 16px rgba(26, 29, 35, 0.08);
        --radius: 8px;
        --focus-ring: 0 0 0 3px rgba(30, 58, 95, 0.18);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --primary: #7baed4;
          --primary-hover: #98c2e0;
          --secondary: #90a4ae;
          --surface: #1a1d22;
          --surface-variant: #252a32;
          --background: #12141a;
          --on-surface: #eceef2;
          --on-surface-muted: #a2abb6;
          --on-primary: #0a0e14;
          --error: #ef9a9a;
          --error-bg: #2a1e1e;
          --info: #64b5f6;
          --info-bg: #19222c;
          --border: #2c323b;
          --border-strong: #3a424d;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.5);
          --focus-ring: 0 0 0 3px rgba(123, 174, 212, 0.25);
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        color: var(--on-surface);
        background: var(--background);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 400px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px 36px 32px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: var(--primary);
        display: grid;
        place-items: center;
        color: var(--on-primary);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--on-surface);
      }
      .subtitle {
        margin: 0 0 24px;
        text-align: center;
        color: var(--on-surface-muted);
        font-size: 14px;
      }

      .alert {
        display: none;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
        border: 1px solid transparent;
      }
      .alert.show {
        display: block;
      }
      .alert-error {
        color: var(--error);
        background: var(--error-bg);
        border-color: color-mix(in srgb, var(--error) 30%, transparent);
      }
      .alert-info {
        color: var(--info);
        background: var(--info-bg);
        border-color: color-mix(in srgb, var(--info) 30%, transparent);
      }

      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--on-surface);
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 10px 12px;
        font: inherit;
        color: var(--on-surface);
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        outline: none;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }
      input[type='text']:focus,
      input[type='password']:focus {
        border-color: var(--primary);
        box-shadow: var(--focus-ring);
      }
      input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      button.submit {
        width: 100%;
        margin-top: 10px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--on-primary);
        background: var(--primary);
        border: 1px solid var(--primary);
        border-radius: 6px;
        cursor: pointer;
        transition:
          background-color 120ms ease,
          transform 60ms ease;
      }
      button.submit:hover:not(:disabled) {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }
      button.submit:active:not(:disabled) {
        transform: translateY(1px);
      }
      button.submit:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      button.submit:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .submit .spinner {
        display: none;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        vertical-align: -2px;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      .submit.loading .spinner {
        display: inline-block;
      }
      .submit.loading .label {
        opacity: 0.85;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 12px;
        color: var(--on-surface-muted);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="title">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">V</div>
          <h1 id="title">VarLens</h1>
        </div>
        <p class="subtitle">Sign in to continue</p>

        <div id="alert" class="alert alert-error" role="alert" aria-live="polite"></div>
        <div id="info" class="alert alert-info" role="status" aria-live="polite"></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              required
              autofocus
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button id="submit" class="submit" type="submit">
            <span class="spinner" aria-hidden="true"></span>
            <span class="label">Sign in</span>
          </button>
        </form>

        <form id="rotate-form" novalidate hidden>
          <p class="subtitle" style="margin-top: -12px">
            Set a new password before continuing. Minimum 12 characters, must differ from your
            current password.
          </p>
          <div class="field">
            <label for="new-password">New password</label>
            <input
              id="new-password"
              name="new-password"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            />
          </div>
          <div class="field">
            <label for="confirm-password">Confirm new password</label>
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              autocomplete="new-password"
              minlength="12"
              required
            />
          </div>
          <button id="rotate-submit" class="submit" type="submit">
            <span class="spinner" aria-hidden="true"></span>
            <span class="label">Set new password</span>
          </button>
        </form>

        <div class="footer">VarLens · offline genetic variant analysis</div>
      </section>
    </main>

    <script>
      ;(function () {
        // Server interpolates these on each request so the page works under
        // any URL prefix (Caddy default: /varlens) without rebuilds.
        var APP_PATH_PREFIX = '__APP_PATH_PREFIX__'
        var REDIRECT_TO = '__REDIRECT_TO__'
        var MIN_PASSWORD_LENGTH = 12

        var loginForm = document.getElementById('login-form')
        var rotateForm = document.getElementById('rotate-form')
        var alertBox = document.getElementById('alert')
        var infoBox = document.getElementById('info')
        var loginBtn = document.getElementById('submit')
        var rotateBtn = document.getElementById('rotate-submit')
        var userInput = document.getElementById('username')
        var passInput = document.getElementById('password')
        var newInput = document.getElementById('new-password')
        var confirmInput = document.getElementById('confirm-password')

        // The plaintext old password is needed to drive auth:changePassword.
        // We hold it in memory between the login response and the rotation
        // submit; cleared the moment rotation succeeds. Module-scoped so a
        // crafted DOM event can't snoop it via a leaked input value.
        var pendingOldPassword = null

        function showError(msg) {
          infoBox.className = 'alert alert-info'
          alertBox.className = 'alert alert-error show'
          alertBox.textContent = msg
        }
        function showInfo(msg) {
          alertBox.className = 'alert alert-error'
          infoBox.className = 'alert alert-info show'
          infoBox.textContent = msg
        }
        function clearMessages() {
          alertBox.className = 'alert alert-error'
          alertBox.textContent = ''
          infoBox.className = 'alert alert-info'
          infoBox.textContent = ''
        }
        function setLoading(form, loading) {
          var btn = form === loginForm ? loginBtn : rotateBtn
          var inputs = form.querySelectorAll('input')
          btn.disabled = loading
          for (var i = 0; i < inputs.length; i++) inputs[i].disabled = loading
          if (loading) btn.classList.add('loading')
          else btn.classList.remove('loading')
        }
        function switchToRotate() {
          loginForm.hidden = true
          rotateForm.hidden = false
          showInfo('Your password has not been rotated since bootstrap. Set a new one to continue.')
          setTimeout(function () {
            newInput.focus()
          }, 0)
        }
        function clearSensitive() {
          passInput.value = ''
          newInput.value = ''
          confirmInput.value = ''
          pendingOldPassword = null
        }

        loginForm.addEventListener('submit', async function (e) {
          e.preventDefault()
          clearMessages()
          var username = userInput.value.trim()
          var password = passInput.value
          if (!username || !password) {
            showError('Enter username and password.')
            return
          }
          setLoading(loginForm, true)
          try {
            var res = await fetch(APP_PATH_PREFIX + '/api/auth/login', {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'content-type': 'application/json', accept: 'application/json' },
              body: JSON.stringify({ args: [username, password] })
            })
            if (!res.ok) {
              showError('Sign-in failed (HTTP ' + res.status + ').')
              return
            }
            var body = await res.json().catch(function () {
              return null
            })
            if (body && body.success === true) {
              if (body.mustChangePassword === true) {
                // Hold the just-validated old password in memory ONLY for
                // the rotation submit. The server's pre-rotation gate
                // forbids any other API call until rotation completes, so
                // even though the session cookie is set, the application
                // surface is unreachable.
                pendingOldPassword = password
                passInput.value = ''
                switchToRotate()
                return
              }
              window.location.assign(REDIRECT_TO)
              return
            }
            if (body && body.locked === true) {
              showError('Account is temporarily locked. Try again in a few minutes.')
              return
            }
            showError('Invalid username or password.')
          } catch (err) {
            showError('Network error — please try again.')
          } finally {
            setLoading(loginForm, false)
          }
        })

        rotateForm.addEventListener('submit', async function (e) {
          e.preventDefault()
          clearMessages()
          if (pendingOldPassword === null) {
            // Defensive: rotate form should never be visible without a
            // login round-trip first. If someone reloaded the page mid-
            // flow, send them back to the login form.
            rotateForm.hidden = true
            loginForm.hidden = false
            showError('Session expired. Sign in again.')
            return
          }
          var newPw = newInput.value
          var confirmPw = confirmInput.value
          if (newPw.length < MIN_PASSWORD_LENGTH) {
            showError('New password must be at least ' + MIN_PASSWORD_LENGTH + ' characters.')
            return
          }
          if (newPw !== confirmPw) {
            showError('New password and confirmation do not match.')
            return
          }
          if (newPw === pendingOldPassword) {
            showError('New password must differ from the current password.')
            return
          }
          setLoading(rotateForm, true)
          try {
            var res = await fetch(APP_PATH_PREFIX + '/api/auth/changePassword', {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'content-type': 'application/json', accept: 'application/json' },
              body: JSON.stringify({ args: [pendingOldPassword, newPw] })
            })
            if (res.status === 401) {
              // Session/old-password mismatch — start over.
              clearSensitive()
              rotateForm.hidden = true
              loginForm.hidden = false
              showError('Session expired. Sign in again.')
              return
            }
            if (res.status === 422) {
              var policyBody = await res.json().catch(function () {
                return null
              })
              showError((policyBody && policyBody.message) || 'Password rejected by policy.')
              return
            }
            if (!res.ok) {
              showError('Could not change password (HTTP ' + res.status + ').')
              return
            }
            var body = await res.json().catch(function () {
              return null
            })
            if (body && body.success === true) {
              clearSensitive()
              window.location.assign(REDIRECT_TO)
              return
            }
            showError('Could not change password.')
          } catch (err) {
            showError('Network error — please try again.')
          } finally {
            setLoading(rotateForm, false)
          }
        })
      })()
    </script>
  </body>
</html>
