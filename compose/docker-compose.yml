# Konzept-Pilot Compose-Stack.
# Aktuell: Reverse-Proxy + Monitoring-Werkzeuge.
# Kommt noch: Anwendungs-Container und Datenbank-Container.

services:
  caddy:
    # Image per Digest gepinnt (Vertrag §vertrag2.3 Reproduzierbarkeit). Update via:
    #   docker pull caddy:2-alpine && docker inspect --format='{{index .RepoDigests 0}}' caddy:2-alpine
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/data/caddy/data:/data
      - /mnt/data/caddy/config:/config
    environment:
      # Hostname/IP für TLS-Zertifikat. Wird beim Deploy in .env injected
      # (siehe make stack-up). Caddy stellt für diesen Namen einen Self-Signed-
      # Cert aus seiner internen CA aus.
      SERVER_HOST: ${SERVER_HOST:-localhost}
    networks:
      - varlens
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: uptime-kuma
    restart: unless-stopped
    # Bindet nur an localhost. Externer Zugriff ausschließlich über Caddy-Reverse-Proxy.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /mnt/data/uptime-kuma:/app/data
    networks:
      - varlens

  dozzle:
    image: amir20/dozzle:latest@sha256:bb7df69b177814466e01397f5d44baabb56dc2fe9c6f7f18b61ce137428452d2
    container_name: dozzle
    restart: unless-stopped
    # Bindet nur an localhost. Externer Zugriff ausschließlich über Caddy-Reverse-Proxy mit Auth.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      # Auth-Schicht über Caddy (Basic-Auth in Caddyfile). Dozzle-eigene Auth
      # bleibt aus, weil es entweder eine users.yml verlangt oder bei Default
      # 502 zurückliefert.
    networks:
      - varlens

  # PostgreSQL als optionaler Service hinter dem Profile "postgres".
  # Aktivieren mit `COMPOSE_PROFILES=postgres docker compose up -d` oder per Makefile:
  #   make stack-up DB=postgres
  # Default-DB ist SQLite - dann wird kein DB-Container gestartet, die Anwendung
  # öffnet stattdessen eine SQLite-Datei unter /mnt/data/app/.
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    container_name: postgres
    restart: unless-stopped
    profiles: [postgres]
    # Bindet nur an localhost - Anwendungs-Container greift über das interne
    # varlens-Netzwerk zu, kein externer Zugriff.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-varlens}
      POSTGRES_USER: ${POSTGRES_USER:-varlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in compose/.env gesetzt sein - siehe docs/database.md}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - varlens

networks:
  varlens:
    name: varlens
