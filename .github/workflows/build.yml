name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

# Cancel stale in-flight runs on the same PR branch when a new push arrives.
# Gated on pull_request so a push-to-main or release run is never cancelled
# mid-flight. Pattern: https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/control-workflow-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── 1. Change detection (always runs, ~5 s) ─────────────────────────
  # Docs-only / .planning-only PRs skip the whole code pipeline and the
  # aggregation gate still reports success. Job-level filter is used
  # instead of workflow-level `paths-ignore` because the latter leaves
  # required status checks in permanent "pending" and blocks merges.
  # See https://github.com/orgs/community/discussions/54877
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/e2e/**'
              - 'tests/fixtures/**'
              - 'tests/main/**'
              - 'tests/perf/**'
              - 'tests/refactor-checkpoint/**'
              - 'tests/renderer/**'
              - 'tests/scripts/**'
              - 'tests/shared/**'
              - 'tests/test-data/**'
              - 'tests/utils/**'
              - 'package.json'
              - 'package-lock.json'
              - 'electron.vite.config.ts'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierignore'
              - '.github/workflows/**'
              - 'vitest.config.ts'
              - 'Makefile'
            web:
              - 'Dockerfile'
              - '.dockerignore'
              - '.env.web.example'
              - 'Makefile'
              - 'package.json'
              - 'package-lock.json'
              - 'src/main/storage/**'
              - 'src/web/**'
              - 'src/renderer/src/**'
              - 'src/shared/**'
              - 'tests/web-gate/**'
              - 'tests/web-smoke/**'
              - 'vite.web*.config.ts'
              - '.github/workflows/build.yml'
              - '.github/workflows/*web*.yml'

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks git --no-banner --redact --report-format sarif --report-path gitleaks-results.sarif --exit-code 1 .

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: gitleaks-results.sarif
          path: gitleaks-results.sarif

  # ── 2. Ubuntu-only fast checks (lint + format + typecheck + test) ──
  # Lint/typecheck/test are deterministic and don't need per-OS runs.
  # Running them three times on the matrix was pure waste. The
  # cross-platform `package` job below still catches OS-specific
  # issues at the compiled-build step.
  checks:
    name: Checks (Ubuntu)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential git-restore-mtime

      # Restore mtimes so TypeScript's --incremental cache stays warm across
      # CI runs. actions/checkout rewrites mtimes to the checkout time,
      # which normally invalidates .tsbuildinfo. See
      # https://github.com/microsoft/TypeScript/issues/59152
      - name: Restore git mtimes
        run: git restore-mtime

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      # Cache ESLint + Prettier results across CI runs. Key on lockfile +
      # lint/format config so stale caches auto-invalidate when rules change.
      - name: Restore lint caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: |
            .eslintcache
            .prettiercache
          key: lint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eslint.config.js', '.prettierignore') }}-${{ github.sha }}
          restore-keys: |
            lint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eslint.config.js', '.prettierignore') }}-
            lint-${{ runner.os }}-

      # Cache TypeScript --incremental build info. Partial restores are fine
      # because tsc/vue-tsc use content hashes inside .tsbuildinfo to decide
      # what to recheck. Pattern per actions/cache#459 discussion.
      - name: Restore tsbuildinfo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: .cache/tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig*.json') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig*.json') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Run linter
        run: npm run lint:check

      - name: Run format check
        run: npm run format:check

      - name: Run type check
        run: npm run typecheck

      # Coverage only on push-to-main — PRs run plain `vitest run` for speed.
      - name: Run tests (PR)
        if: github.event_name == 'pull_request'
        run: npm run test

      - name: Run tests with coverage (main)
        if: github.event_name == 'push'
        run: npm run test:coverage

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: coverage/coverage-summary.json

  # ── 3. Cross-platform compiled-build validation ────────────────────
  # Only runs after `checks` passes. Validates that electron-vite +
  # electron-builder can produce a working artifact on each target OS.
  # Uses `actions/checkout` + `setup-node` fresh on each runner — the
  # Electron-ABI native binary can't be shared with the Ubuntu checks
  # job because it's a different Node environment.
  package:
    name: Package (${{ matrix.os }})
    needs: [changes, checks]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      # Cache the Electron-ABI native binary. Key must include runner.os,
      # runner.arch, the exact Electron version spec from package.json, and
      # the lockfile hash — a partial match would leave a wrong-ABI `.node`
      # on disk and silently corrupt the build. No restore-keys fallback
      # for the same reason.
      - name: Extract Electron version
        id: electron-ver
        shell: bash
        run: echo "ver=$(node -p "require('./package.json').devDependencies.electron")" >> "$GITHUB_OUTPUT"

      - name: Cache native module for Electron ABI
        id: native-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: node_modules/better-sqlite3-multiple-ciphers/build/Release
          key: native-electron-${{ runner.os }}-${{ runner.arch }}-${{ steps.electron-ver.outputs.ver }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npm run rebuild:electron

      - name: Build Electron app
        run: npx electron-vite build

      - name: Run startup smoke (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test tests/e2e/startup-smoke.e2e.ts --workers=1

      - name: Upload startup smoke artifacts (Linux)
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: startup-smoke-linux
          path: |
            test-results/
            .planning/artifacts/perf/phase1/baseline/startup-smoke/

      - name: Package Electron app
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Run packaged smoke (Linux)
        if: runner.os == 'Linux'
        # The packaged Electron binary ships `chrome-sandbox` unpacked; the
        # runtime requires it to be root-owned mode 4755, which GitHub Actions
        # runners do not set up. `VARLENS_E2E_NO_SANDBOX=1` tells the smoke
        # helper to launch with `--no-sandbox`. The fuse baseline under test
        # is unaffected by this flag.
        env:
          VARLENS_E2E_NO_SANDBOX: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test tests/e2e/packaged-smoke.e2e.ts --workers=1

      - name: Upload packaged smoke artifacts (Linux)
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: packaged-smoke-linux
          path: |
            test-results/
            .planning/artifacts/perf/phase1/baseline/packaged-smoke/

  # ── 4. Web-mode required check for web app surfaces ────────────────
  # The standalone `Web CI` workflow stays for readability, but this
  # job folds the same web readiness gate into the required Build / CI
  # aggregator. A web-only app change therefore cannot merge on the
  # desktop checks alone.
  web-ci:
    name: Web CI
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: varlens_web_ci
          POSTGRES_USER: varlens
          POSTGRES_PASSWORD: varlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U varlens -d varlens_web_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      VARLENS_PG_URL: postgres://varlens:varlens@127.0.0.1:5432/varlens_web_ci
      VARLENS_RECOVERY_KEY_DIR: /tmp/varlens-web-ci-secrets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Run opt-in web gate
        run: make web-ci

      - name: Docker runtime image smoke
        if: github.event_name == 'pull_request'
        run: docker build --target runtime -t varlens-web-pr-smoke .

  # ── 5. Required-status-check aggregator ────────────────────────────
  # Branch protection should require THIS job (and secrets-scan) only.
  # It succeeds when all required upstream jobs for the changed surface
  # succeeded, except docs-only / planning-only PRs where desktop and web
  # gated jobs were intentionally skipped. This avoids the `paths-ignore`
  # pending-forever trap while still failing on cancelled or unexpectedly
  # skipped upstream jobs.
  ci:
    name: CI
    needs: [changes, secrets-scan, checks, package, web-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute overall result
        run: |
          for r in \
            "${{ needs.changes.result }}" \
            "${{ needs.secrets-scan.result }}"; do
            if [ "$r" != "success" ]; then
              echo "::error::Required job result was '$r' (expected 'success'). Failing."
              exit 1
            fi
          done
          if [ "${{ needs.changes.outputs.code }}" = "false" ] && [ "${{ needs.changes.outputs.web }}" = "false" ]; then
            echo "No code or web surface changed; build jobs were intentionally skipped. PASS."
            exit 0
          fi
          if [ "${{ needs.changes.outputs.code }}" = "true" ]; then
            for r in \
              "${{ needs.checks.result }}" \
              "${{ needs.package.result }}"; do
              if [ "$r" != "success" ]; then
                echo "::error::Required desktop job result was '$r' (expected 'success'). Failing."
                exit 1
              fi
            done
          fi
          if [ "${{ needs.changes.outputs.web }}" = "true" ]; then
            if [ "${{ needs.web-ci.result }}" != "success" ]; then
              echo "::error::Required web-ci job result was '${{ needs.web-ci.result }}' (expected 'success'). Failing."
              exit 1
            fi
          fi
          echo "All required jobs succeeded."
