# Build, Trivy-scan, and publish the VarLens web image to GHCR.
#
# Triggers:
#   - manual workflow_dispatch for an explicit web Dev/Test test run
#   - published GitHub release whose tag starts with `web-`
#
# Versioned deploy orchestration lives outside this application repo.
# This workflow builds, tests, scans, and publishes the web application image.
# In robspan/VarLens-upstream-fork it dispatches the platform Dev/Test web
# deploy after a successful manual web run or published `web-*` release. Plain
# desktop releases such as `v0.68.0` are intentionally ignored by this workflow.
#
# Trivy posture:
#   - Gating step: CRITICAL only — fails the workflow if any non-ignored
#     CRITICAL CVE is present. A bad CRITICAL must not be silently shipped.
#   - Advisory step: HIGH (and below) — uploaded to the Security tab as
#     SARIF for review, never blocks. SARIF is uploaded with an explicit
#     `category` so future scanners can coexist.
#
# The published digest goes into the workflow summary so an external
# operator/deploy repository can pin the image by sha256.
#
# Fork note: `GITHUB_TOKEN` can only push to an existing GHCR package when
# that package grants this repository write access. Forks should still run the
# web gate, but they should not fail only because publish access is absent. Set
# repository variable `VARLENS_WEB_PUBLISH_GHCR=1` after granting package access
# if a fork intentionally needs to publish an edge image.

name: publish-web

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/varlens-web
  PLATFORM_REPOSITORY: robspan/app-platform-iac
  PLATFORM_ACCEPT_WORKFLOW: accept-varlens-web-release.yml

jobs:
  web-ci:
    if: |
      github.event_name == 'workflow_dispatch'
      || startsWith(github.event.release.tag_name, 'web-')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: varlens_web_ci
          POSTGRES_USER: varlens
          POSTGRES_PASSWORD: varlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U varlens -d varlens_web_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      VARLENS_PG_URL: postgres://varlens:varlens@127.0.0.1:5432/varlens_web_ci
      VARLENS_RECOVERY_KEY_DIR: /tmp/varlens-web-ci-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Run opt-in web gate
        run: make web-ci

  build-and-push:
    needs: web-ci
    if: |
      (
        github.event_name == 'workflow_dispatch'
        || startsWith(github.event.release.tag_name, 'web-')
      )
      && (
        github.repository == 'berntpopp/VarLens'
        || vars.VARLENS_WEB_PUBLISH_GHCR == '1'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      image_repository: ${{ steps.source.outputs.image_repository }}
      image_tag: ${{ steps.source.outputs.image_tag }}
      source_ref: ${{ steps.source.outputs.source_ref }}
      source_sha: ${{ steps.source.outputs.source_sha }}
    env:
      SCAN_TAG: ghcr.io/${{ github.repository_owner }}/varlens-web:ci-scan-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - name: Resolve source and image metadata
        id: source
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          source_ref="${GITHUB_REF_NAME}"
          image_tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            image_tag="edge"
          fi
          if ! [[ "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Release tag '${image_tag}' is not Docker-tag compatible."
            exit 1
          fi
          {
            echo "source_sha=${source_sha}"
            echo "source_ref=${source_ref}"
            echo "image_repository=${REGISTRY}/${IMAGE_NAME}"
            echo "image_tag=${image_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ steps.source.outputs.image_tag }},enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Build image for security gate
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # docker/build-push-action@v6.6.1
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.SCAN_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy gate — CRITICAL only (fails before push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy advisory scan (HIGH+) — SARIF for Security tab
        id: trivy-advisory
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-web-image

      - name: Push scanned image
        id: push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # docker/build-push-action@v6.6.1
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarise digest
        run: |
          {
            echo "## Published image"
            echo ""
            echo "**Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo ""
            echo "**Repository:** \`${{ steps.source.outputs.image_repository }}\`"
            echo ""
            echo "**Tags:**"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "Pin in the deploy repo:"
            echo ""
            echo "\`\`\`yaml"
            echo "image: ${{ steps.source.outputs.image_repository }}@${{ steps.push.outputs.digest }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch-platform-release:
    name: Dispatch platform dev/test web deploy
    needs: build-and-push
    if: |
      github.repository == 'robspan/VarLens-upstream-fork'
      && (
        github.event_name == 'workflow_dispatch'
        || (
          github.event_name == 'release'
          && github.event.action == 'published'
          && startsWith(github.event.release.tag_name, 'web-')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch app-platform-iac accept workflow
        env:
          GH_TOKEN: ${{ secrets.APP_PLATFORM_DISPATCH_TOKEN }}
          PLATFORM_REPOSITORY: ${{ env.PLATFORM_REPOSITORY }}
          PLATFORM_ACCEPT_WORKFLOW: ${{ env.PLATFORM_ACCEPT_WORKFLOW }}
          SOURCE_REPO: https://github.com/${{ github.repository }}
          SOURCE_REF: ${{ needs.build-and-push.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.build-and-push.outputs.source_sha }}
          IMAGE_REPOSITORY: ${{ needs.build-and-push.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_DIGEST: ${{ needs.build-and-push.outputs.digest }}
          APP_WORKFLOW_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::APP_PLATFORM_DISPATCH_TOKEN is required to dispatch the platform deploy workflow."
            exit 1
          fi

          payload="$(
            jq -n \
              --arg ref "main" \
              --arg app "varlens" \
              --arg source_repo "$SOURCE_REPO" \
              --arg source_ref "$SOURCE_REF" \
              --arg source_sha "$SOURCE_SHA" \
              --arg image_repository "$IMAGE_REPOSITORY" \
              --arg image_tag "$IMAGE_TAG" \
              --arg image_digest "$IMAGE_DIGEST" \
              --arg app_workflow_run "$APP_WORKFLOW_RUN" \
              '{
                ref: $ref,
                inputs: {
                  app: $app,
                  source_repo: $source_repo,
                  source_ref: $source_ref,
                  source_sha: $source_sha,
                  image_repository: $image_repository,
                  image_tag: $image_tag,
                  image_digest: $image_digest,
                  app_workflow_run: $app_workflow_run
                }
              }'
          )"

          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PLATFORM_REPOSITORY}/actions/workflows/${PLATFORM_ACCEPT_WORKFLOW}/dispatches" \
            -d "$payload"

          {
            echo "## Platform deploy dispatched"
            echo ""
            echo "- Workflow: \`${PLATFORM_REPOSITORY}/${PLATFORM_ACCEPT_WORKFLOW}\`"
            echo "- Image: \`${IMAGE_REPOSITORY}@${IMAGE_DIGEST}\`"
            echo "- Source: \`${SOURCE_REF} (${SOURCE_SHA})\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-skipped:
    needs: web-ci
    if: |
      (
        github.event_name == 'workflow_dispatch'
        || startsWith(github.event.release.tag_name, 'web-')
      )
      && github.repository != 'berntpopp/VarLens'
      && vars.VARLENS_WEB_PUBLISH_GHCR != '1'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped GHCR publish
        run: |
          {
            echo "## GHCR publish skipped"
            echo ""
            echo "The web gate passed, but this repository is not configured to publish"
            echo "\`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge\`."
            echo ""
            echo "This avoids fork-only 403 failures when the existing GHCR package"
            echo "is owned by another repository. To publish from this repository,"
            echo "grant it write access to the GHCR package and set repository"
            echo "variable \`VARLENS_WEB_PUBLISH_GHCR=1\`."
          } >> "$GITHUB_STEP_SUMMARY"

  desktop-release-skipped:
    if: |
      github.event_name == 'release'
      && github.event.action == 'published'
      && !startsWith(github.event.release.tag_name, 'web-')
    runs-on: ubuntu-latest
    steps:
      - name: Explain desktop release skip
        run: |
          {
            echo "## Web publish skipped"
            echo ""
            echo "Release tag \`${{ github.event.release.tag_name }}\` is not a web release tag."
            echo ""
            echo "Use a \`web-\` prefix, for example \`web-v0.68.1\`, when this"
            echo "release should build and deploy the web image. Desktop releases"
            echo "such as \`v0.68.1\` are handled by the desktop release workflow."
          } >> "$GITHUB_STEP_SUMMARY"
