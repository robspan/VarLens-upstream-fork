#cloud-config
# First-boot bootstrap for the Concept Pilot.
# Rendered by OpenTofu via templatefile; variables come from the Tofu invocation:
#   ${deploy_user}  - name of the sudo user that gets created.
#   ${ssh_pubkey}   - SSH key installed for root and the deploy user.
#   ${volume_id}    - Hetzner volume ID, resolved to /dev/disk/by-id/scsi-0HC_Volume_<id>.

timezone: Europe/Berlin
locale: de_DE.UTF-8

# Install default packages. Docker and the Compose plugin come from the official Docker repository.
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - unattended-upgrades
  - apt-listchanges
  - htop
  - vim
  - tmux
  - git
  - age
  - bzip2  # for restic tarball extraction

# Create sudo user with SSH key, disable root login.
# The docker group is added in runcmd because it does not yet exist
# at user creation time (Docker is installed later in runcmd).
users:
  - name: ${deploy_user}
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_pubkey}

# Harden SSH.
write_files:
  - path: /etc/ssh/sshd_config.d/10-konzept.conf
    permissions: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      AllowUsers ${deploy_user}

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    permissions: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "$${distro_id}:$${distro_codename}-security";
          "$${distro_id}:$${distro_codename}-updates";
      };
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:30";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

  # restic backup: example configuration. The maintainer copies this to env and fills in
  # real Hetzner Object Storage credentials and a strong restic password.
  - path: /etc/restic/env.example
    permissions: "0600"
    content: |
      RESTIC_REPOSITORY=s3:s3.eu-central-003.hetznerobjects.com/varlens-pilot-backup
      RESTIC_PASSWORD=REPLACE_WITH_OPENSSL_RAND_BASE64_32
      AWS_ACCESS_KEY_ID=REPLACE_WITH_HETZNER_S3_ACCESS_KEY
      AWS_SECRET_ACCESS_KEY=REPLACE_WITH_HETZNER_S3_SECRET_KEY
      HEARTBEAT_URL=
      BACKUP_PATHS=/mnt/data
      RETENTION_KEEP_DAILY=7
      RETENTION_KEEP_WEEKLY=4
      RETENTION_KEEP_MONTHLY=6

  - path: /etc/systemd/system/restic-backup.service
    permissions: "0644"
    content: |
      [Unit]
      Description=restic backup to Hetzner Object Storage
      Wants=network-online.target
      After=network-online.target docker.service
      ConditionPathExists=/etc/restic/env
      ConditionPathIsMountPoint=/mnt/data

      [Service]
      Type=oneshot
      EnvironmentFile=/etc/restic/env
      ExecStart=/usr/local/bin/varlens-backup.sh
      User=root
      Nice=10
      IOSchedulingClass=best-effort
      IOSchedulingPriority=7

  - path: /etc/systemd/system/restic-backup.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Daily restic backup at 01:30
      Requires=restic-backup.service

      [Timer]
      # Run at 01:30 to leave 2h of headroom before the 03:30
      # unattended-upgrades automatic-reboot window (see audit F10):
      # a backup that ran at 02:30 could be killed mid-snapshot when
      # the machine reboots, leaving a stale restic lock behind.
      OnCalendar=*-*-* 01:30:00
      Persistent=true
      RandomizedDelaySec=15min

      [Install]
      WantedBy=timers.target

# Formatting the data volume is handled by hcloud_volume.format = "ext4".
# Here we only define the fstab entry and mount point.
mounts:
  - ["/dev/disk/by-id/scsi-0HC_Volume_${volume_id}", "/mnt/data", "ext4", "discard,nofail,defaults", "0", "2"]

runcmd:
  # Defensively create directories for configuration written later.
  # /etc/restic is only populated with content by `setup-backup.py` - the
  # systemd unit has ConditionPathExists=/etc/restic/env and silently skips
  # until then. The directory itself should still exist.
  - install -m 0700 -d /etc/restic

  # Robust volume mount: Hetzner attaches the volume asynchronously and the
  # device under /dev/disk/by-id/scsi-0HC_Volume_<id> may not yet be present
  # when cloud-init's `mounts` module runs. With `nofail` the mount silently
  # skips on miss and /mnt/data ends up empty. Wait up to 60s for the link,
  # then mount-a until success.
  #
  # CRITICAL: this step MUST fail bootstrap if the volume cannot be mounted.
  # The previous version logged a WARN and continued — the next runcmds
  # (mkdir + chown of /mnt/data) then wrote to the OS disk, those entries
  # got hidden when the volume eventually mounted on top, and the operator
  # ended up with a half-broken server (looks healthy at SSH, but
  # /mnt/data/app does not exist when stack-up tries to rsync into it).
  # Failing loud here is the right trade-off: a fresh bring-up that needs
  # 5 minutes is fine; a half-broken server that fails on rsync 30 minutes
  # later is not.
  - |
    for i in $(seq 1 30); do
      if [ -b /dev/disk/by-id/scsi-0HC_Volume_${volume_id} ]; then break; fi
      sleep 2
    done
    mountpoint -q /mnt/data || mount /mnt/data || mount -a
    if ! mountpoint -q /mnt/data; then
      echo "[cloud-init] BOOTSTRAP_FAIL: /mnt/data is not mounted after volume-attach retry"
      echo "[cloud-init] device check: $(ls -la /dev/disk/by-id/scsi-0HC_Volume_${volume_id} 2>&1)"
      echo "[cloud-init] lsblk: $(lsblk 2>&1)"
      exit 1
    fi
    echo "[cloud-init] /mnt/data mounted OK ($(df -h /mnt/data | tail -1))"

  # Set up the official Docker repository and install the engine plus Compose plugin.
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Add the deploy user to the docker group (the group only exists after Docker is installed).
  - usermod -aG docker ${deploy_user}

  # SOPS and restic from GitHub releases (the Ubuntu repo versions are outdated).
  # SHA256 checksums are hardcoded for supply-chain verification. Update on version bump.
  - |
    SOPS_VERSION=v3.9.0
    SOPS_SHA256=0d65660fbe785647ff4f1764d7f69edf598f79d6d79ebbef4a501909b6ff6b82
    curl -fsSL "https://github.com/getsops/sops/releases/download/$${SOPS_VERSION}/sops-$${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
    echo "$${SOPS_SHA256}  /usr/local/bin/sops" | sha256sum -c - || { echo "FAIL: SOPS sha256 mismatch"; rm -f /usr/local/bin/sops; exit 1; }
    chmod +x /usr/local/bin/sops
  - |
    RESTIC_VERSION=0.17.1
    RESTIC_SHA256=bdfaf16fe933136e3057e64e28624f2e0451dbd47e23badb2d37dbb60fdb6a70
    curl -fsSL "https://github.com/restic/restic/releases/download/v$${RESTIC_VERSION}/restic_$${RESTIC_VERSION}_linux_amd64.bz2" -o /tmp/restic.bz2
    echo "$${RESTIC_SHA256}  /tmp/restic.bz2" | sha256sum -c - || { echo "FAIL: restic sha256 mismatch"; rm -f /tmp/restic.bz2; exit 1; }
    bunzip2 -c /tmp/restic.bz2 > /usr/local/bin/restic
    rm -f /tmp/restic.bz2
    chmod +x /usr/local/bin/restic

  # Directories for the Compose stack components on the data volume.
  # Re-assert /mnt/data is mounted before writing — the earlier mount step
  # already exited 1 if the volume failed to mount, but a defensive
  # assertion here catches any edge case where /mnt/data is somehow not
  # the volume (e.g., race with systemd remount). Without this, mkdir
  # silently writes to the OS disk and gets hidden when the volume
  # mounts on top — produces /mnt/data/app missing when rsync needs it.
  - |
    if ! mountpoint -q /mnt/data; then
      echo "[cloud-init] BOOTSTRAP_FAIL: /mnt/data is not mounted at mkdir step"
      exit 1
    fi
    mkdir -p /mnt/data/postgres /mnt/data/caddy /mnt/data/app /mnt/data/backup
    chown -R ${deploy_user}:${deploy_user} /mnt/data
    # /mnt/data/app/data is the container-writable subdir (uid 1001 inside
    # the varlens image). Create it pre-chowned so the first stack-up
    # does not race with rsync --delete.
    install -d -m 0755 -o 1001 -g 1001 /mnt/data/app/data
    # Sanity: persist a marker noting the volume layout, useful for the
    # bootstrap success check and post-mortems.
    df -h /mnt/data > /var/log/varlens-volume-layout.txt
    ls -la /mnt/data/ >> /var/log/varlens-volume-layout.txt

  # Install the backup script. Placed in /usr/local/bin and invoked by the systemd service.
  # Phase 2: Postgres-aware. pg_dump → restic snapshot of the dump (NOT
  # the live PGDATA). The full implementation lives at scripts/backup.sh
  # in the repo; this is the slimmed-down clone the cloud-init bake.
  - |
    cat > /usr/local/bin/varlens-backup.sh <<'BACKUP_SCRIPT'
    #!/usr/bin/env bash
    # Invoked by /etc/systemd/system/restic-backup.service.
    set -euo pipefail
    mountpoint -q /mnt/data || { echo "FAIL: /mnt/data is not mounted"; exit 1; }
    : "$${RESTIC_REPOSITORY:?RESTIC_REPOSITORY must be set}"
    : "$${RESTIC_PASSWORD:?RESTIC_PASSWORD must be set}"
    : "$${BACKUP_PATHS:=/mnt/data}"
    : "$${RETENTION_KEEP_DAILY:=7}"
    : "$${RETENTION_KEEP_WEEKLY:=4}"
    : "$${RETENTION_KEEP_MONTHLY:=6}"
    : "$${POSTGRES_USER:=varlens}"
    : "$${POSTGRES_DB:=varlens}"
    PG_DUMP_DIR="/mnt/data/postgres-dumps"
    PG_DUMP_LOCAL_RETENTION_DAYS=7
    if ! restic snapshots --no-lock --json >/dev/null 2>&1; then
        restic init
    fi
    if restic list locks --no-lock 2>/dev/null | grep -q .; then
        echo "[varlens-backup] stale lock detected, calling restic unlock --remove-all"
        restic unlock --remove-all || true
    fi
    # Phase 2 Postgres quiesce: logical pg_dump BEFORE restic snapshot.
    # Raw /mnt/data/postgres (PGDATA) is excluded from restic — file-
    # system snapshots of a live cluster are torn. The dump file is
    # the consistent snapshot restic backs up.
    mkdir -p "$${PG_DUMP_DIR}"
    PG_DUMP_FILE="$${PG_DUMP_DIR}/varlens-$(date -u +%Y%m%dT%H%M%SZ).dump"
    if docker ps --format '{{.Names}}' | grep -q '^postgres$'; then
        if ! docker exec postgres pg_dump \
            --format=custom --no-owner --no-acl --compress=6 \
            -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" > "$${PG_DUMP_FILE}"; then
            echo "[varlens-backup] ERROR: pg_dump failed"
            rm -f "$${PG_DUMP_FILE}"
            exit 4
        fi
        DUMP_BYTES="$(stat -c%s "$${PG_DUMP_FILE}" 2>/dev/null || echo 0)"
        if [ "$${DUMP_BYTES}" -lt 100 ]; then
            echo "[varlens-backup] ERROR: pg_dump produced suspiciously small file ($${DUMP_BYTES} bytes)"
            rm -f "$${PG_DUMP_FILE}"
            exit 5
        fi
    else
        echo "[varlens-backup] ERROR: postgres container not running — refusing to back up without quiesce"
        exit 6
    fi
    find "$${PG_DUMP_DIR}" -name 'varlens-*.dump' -type f -mtime +"$${PG_DUMP_LOCAL_RETENTION_DAYS}" -delete 2>/dev/null || true
    restic backup "$${BACKUP_PATHS}" --tag auto --tag "$(date +%Y-%m-%d)" \
        --exclude '/mnt/data/postgres' \
        --exclude '/mnt/data/postgres/**'
    restic forget --keep-daily "$${RETENTION_KEEP_DAILY}" --keep-weekly "$${RETENTION_KEEP_WEEKLY}" --keep-monthly "$${RETENTION_KEEP_MONTHLY}" --prune || true
    if [ -n "$${HEARTBEAT_URL:-}" ]; then
        curl -fsS --max-time 10 --retry 3 "$${HEARTBEAT_URL}" >/dev/null || true
    fi
    BACKUP_SCRIPT
    chmod 0755 /usr/local/bin/varlens-backup.sh

  # Enable the systemd timer (the service only starts once /etc/restic/env has been
  # created by the maintainer - otherwise ConditionPathExists skips it).
  - systemctl daemon-reload
  - systemctl enable --now restic-backup.timer

  # UFW: allow SSH, HTTP, HTTPS. The Hetzner Cloud Firewall is redundant but adds defense in depth.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Restart sshd and unattended-upgrades.
  - systemctl restart ssh
  - systemctl enable --now unattended-upgrades

  # Bootstrap success marker. Asserts every prerequisite the orchestrator (pilot.sh)
  # depends on, then writes /var/lib/cloud/instance/varlens-bootstrap.ok ONLY when
  # all checks pass. `cloud-init status --wait` returns success even when individual
  # runcmd entries fail (see audit F2), so the orchestrator MUST gate on this marker
  # rather than cloud-init's own status. On any failure we echo BOOTSTRAP_FAIL:<reason>
  # to stdout (lands in /var/log/cloud-init-output.log) and exit 1 from this entry —
  # that prevents the marker from being written, which is the actual signal.
  - |
    set -e
    fail() { echo "BOOTSTRAP_FAIL: $1"; exit 1; }
    command -v docker >/dev/null 2>&1 || fail "docker CLI not installed"
    docker compose version >/dev/null 2>&1 || fail "docker compose v2 plugin not installed"
    mountpoint -q /mnt/data || fail "/mnt/data is not a mountpoint"
    id -nG ${deploy_user} 2>/dev/null | grep -qw docker || fail "${deploy_user} not in docker group"
    [ -d /mnt/data/app ] || fail "/mnt/data/app directory missing"
    install -d -m 0755 /var/lib/cloud/instance
    : > /var/lib/cloud/instance/varlens-bootstrap.ok
    echo "[cloud-init] varlens-bootstrap.ok written; all prerequisites verified"

# Machine-readable bootstrap-done signal.
# $${UPTIME} (double dollar) escapes Tofu templatefile so cloud-init resolves it at runtime.
final_message: "cloud-init bootstrap finished after $${UPTIME} seconds. Log in as ${deploy_user}."
