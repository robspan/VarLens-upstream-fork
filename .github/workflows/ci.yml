name: CI

# Plan-Bezug: konzept/infrastruktur.html §infrastruktur2 Phase 1 listet
# „GitHub Actions + GHCR + Trivy" als Pflicht-Komponente. Dieser Workflow
# erfüllt den IaC- und Container-Scan-Anteil. GHCR-Image-Push folgt sobald
# der Anwendungs-Container existiert.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  tofu-format:
    name: OpenTofu Format-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.7.0
      - run: tofu fmt -check -recursive tofu/

  tofu-validate:
    name: OpenTofu Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.7.0
      - name: Initialize ohne Backend
        working-directory: tofu/environments/pilot
        run: tofu init -backend=false
      - name: Validate
        working-directory: tofu/environments/pilot
        run: tofu validate

  trivy-config:
    name: Trivy Config-Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan Tofu, Compose und cloud-init
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  trivy-images:
    name: Trivy Image-Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - caddy:2-alpine
          - louislam/uptime-kuma:1
          - amir20/dozzle:latest
    steps:
      - name: Scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          exit-code: 0  # nur reporten, nicht failen, weil Image-Updates external getrieben sind
          ignore-unfixed: true

  gitleaks:
    name: Gitleaks Secret-Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    name: Shellcheck (scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --severity=warning scripts/*.sh

  yamllint:
    name: YAML-Lint (cloud-init und Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        run: |
          pip install --quiet yamllint
          # Tofu-templatefile-Variablen ignorieren (sind kein gültiges YAML vor templating)
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" \
            compose/docker-compose.yml \
            .github/workflows/ci.yml || true
          # cloud-init enthält Tofu-Template-Variablen, daher nur Syntax-Check ohne Style
          python3 -c "import yaml; yaml.safe_load(open('compose/docker-compose.yml'))"

  caddy-validate:
    name: Caddyfile Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/compose/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile
