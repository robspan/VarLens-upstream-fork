name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --linux --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --mac --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --win --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Regenerate latest.yml with signed exe hashes
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        shell: pwsh
        run: |
          # Replace unsigned .exe files with signed versions in release/
          Copy-Item -Path release-signed/*.exe -Destination release/ -Force

          # Recalculate SHA512 hashes and file sizes, update latest.yml
          $yml = Get-Content release/latest.yml -Raw
          foreach ($exe in Get-ChildItem release/*.exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
            $b64 = [Convert]::ToBase64String([byte[]] -split ($hash -replace '..', '0x$& '))
            $size = $exe.Length
            $name = $exe.Name
            # Update sha512 for this file's entry
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: )\S+", $b64
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: \S+\s*\n\s*size: )\d+", $size
          }
          Set-Content release/latest.yml $yml -NoNewline

      - name: Upload updated latest.yml
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/latest.yml
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [release-linux, release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish draft release and mark as latest
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.id')
          gh api -X PATCH repos/${{ github.repository }}/releases/$RELEASE_ID \
            -F draft=false \
            -F make_latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
