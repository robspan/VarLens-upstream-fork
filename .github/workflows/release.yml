name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > release_notes.md
            echo "" >> release_notes.md
            git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges \
              | grep -v "Co-Authored-By" >> release_notes.md || true
          else
            echo "Initial release" > release_notes.md
          fi

      - name: Create draft release
        id: create
        run: |
          BODY=$(cat release_notes.md)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="${{ github.ref_name }}" \
            -f body="$BODY" \
            -F draft=true \
            -F prerelease=false \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    name: Release (Linux)
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --linux --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  release-macos:
    name: Release (macOS)
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  release-windows:
    name: Release (Windows)
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # --- SSL.com eSigner Code Signing (Windows) ---
      # Gated on ESIGNER_ENABLED variable to conserve signing quota (20/month).
      # Only signs .exe and .msi installers, not portable builds.

      - name: Sign Windows Setup EXE with SSL.com eSigner
        if: vars.ESIGNER_ENABLED == 'true'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/release/Varlens-Setup-${{ needs.create-release.outputs.version }}.exe
          output_path: ${{ github.workspace }}/release-signed/
          environment_name: PROD
          signing_method: v2

      - name: Sign Windows Setup MSI with SSL.com eSigner
        if: vars.ESIGNER_ENABLED == 'true'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/release/Varlens-Setup-${{ needs.create-release.outputs.version }}.msi
          output_path: ${{ github.workspace }}/release-signed/
          environment_name: PROD
          signing_method: v2

      - name: Replace unsigned artifacts with signed versions
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          if (Test-Path release-signed/*.exe) {
            Copy-Item -Path release-signed/*.exe -Destination release/ -Force
          }
          if (Test-Path release-signed/*.msi) {
            Copy-Item -Path release-signed/*.msi -Destination release/ -Force
          }

      - name: Regenerate latest.yml with signed artifact hashes
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          $yml = Get-Content release/latest.yml -Raw
          foreach ($exe in Get-ChildItem release/*.exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
            $b64 = [Convert]::ToBase64String([byte[]] -split ($hash -replace '..', '0x$& '))
            $size = $exe.Length
            $name = $exe.Name
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: )\S+", $b64
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: \S+\s*\n\s*size: )\d+", $size
          }
          Set-Content release/latest.yml $yml -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.msi
            release/*.zip
            release/latest.yml

  publish-release:
    name: Publish Release
    needs: [create-release, release-linux, release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload all assets to release
        run: |
          for file in artifacts/*; do
            [ -f "$file" ] && gh release upload "${{ github.ref_name }}" "$file" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish draft release and mark as latest
        run: |
          gh api -X PATCH repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
            -F draft=false \
            -F make_latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
