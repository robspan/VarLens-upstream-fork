# Concept Pilot Compose stack.
# Reverse proxy + monitoring tools + the VarLens app container.
# Phase 2: Postgres is the only supported web backend. The varlens
# service depends_on the postgres service; both are unconditional.
# (See .planning/web/phase2-execution-plan.md.)

services:
  caddy:
    # Image pinned by digest (contract §vertrag2.3 reproducibility). Update via:
    #   docker pull caddy:2-alpine && docker inspect --format='{{index .RepoDigests 0}}' caddy:2-alpine
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/data/caddy/data:/data
      - /mnt/data/caddy/config:/config
    environment:
      # Hostname or IP used as the Caddy site address. Injected into .env
      # at deploy time (see make stack-up).
      SERVER_HOST: ${SERVER_HOST:-localhost}
      # TLS profile snippet name (defined in the Caddyfile):
      #   tls-internal    self-signed via Caddy's internal CA
      #   tls-le-classic  Let's Encrypt 90-day cert (requires real domain)
      #   tls-le-ip       Let's Encrypt 7-day shortlived cert for raw IPs
      CADDY_TLS_PROFILE: ${CADDY_TLS_PROFILE-tls-le-ip}
    networks:
      - varlens
    healthcheck:
      # /healthz is a redirect-exempt 200 endpoint defined in the Caddyfile
      # specifically for this probe. BusyBox wget in caddy:2-alpine has no
      # --max-redirect option, so a redirect-following probe of / would
      # fail at SNI/cert. /healthz keeps the probe trivial.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: uptime-kuma
    restart: unless-stopped
    # Bound to localhost only. External access exclusively via the Caddy reverse proxy.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /mnt/data/uptime-kuma:/app/data
    networks:
      - varlens

  dozzle:
    image: amir20/dozzle:latest@sha256:bb7df69b177814466e01397f5d44baabb56dc2fe9c6f7f18b61ce137428452d2
    container_name: dozzle
    restart: unless-stopped
    # Bound to localhost only. External access exclusively via the Caddy reverse proxy with auth.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      # Sub-path mount behind Caddy at /logs. Ensures Dozzle emits UI assets
      # correctly under /logs/... rather than absolutely under /.
      DOZZLE_BASE: /logs
      # Auth layer is handled by Caddy (basic auth in Caddyfile). Dozzle's own
      # auth stays disabled because it either requires a users.yml or returns
      # 502 on default settings.
    networks:
      - varlens

  # VarLens application container — the §infrastruktur2 application slot.
  # Image is operator-configurable via VARLENS_IMAGE in compose/.env. Pin
  # to the digest (`@sha256:...`) emitted by the publish-web GitHub
  # workflow once the first image lands; the floating `:edge` tag in the
  # default below is convenient for first-boot but reproducibility (per
  # §vertrag2.3) requires a digest pin in production.
  varlens:
    image: ${VARLENS_IMAGE:-ghcr.io/robspan/varlens-web:edge}
    container_name: varlens
    restart: unless-stopped
    # No host port mapping: Caddy reaches the app on the internal `varlens`
    # network as `varlens:8080`. Exposing a host port here would conflict
    # with dozzle (also 127.0.0.1:8080) and adds attack surface for no
    # external benefit. Debug from the server via `docker exec varlens
    # wget -qO- http://127.0.0.1:8080/healthz` if needed.
    volumes:
      # Runtime data (SQLite + admin recovery key) goes in a sub-dir so
      # /mnt/data/app/ itself stays owned by the deploy user (uid 1000) for
      # rsync of compose files, while /mnt/data/app/data/ is chowned to
      # the container's varlens user (uid 1001) for writes. Created and
      # chowned by pilot.sh's wait_for_server_ready.
      - /mnt/data/app/data:/data
    environment:
      # Phase 2: web mode is Postgres-only. The app refuses to boot
      # without VARLENS_PG_URL — see src/web/server.ts. The default
      # below points at the local postgres service that activates with
      # `COMPOSE_PROFILES=postgres`. Operators can override to point
      # at an external Postgres if needed.
      VARLENS_PG_URL: ${VARLENS_PG_URL:-postgres://${POSTGRES_USER:-varlens}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in compose/.env (or override VARLENS_PG_URL for an external Postgres)}@postgres:5432/${POSTGRES_DB:-varlens}}
      VARLENS_PG_SCHEMA: ${VARLENS_PG_SCHEMA:-public}
      VARLENS_RECOVERY_KEY_DIR: ${VARLENS_RECOVERY_KEY_DIR:-/data}
      VARLENS_WEB_PORT: ${VARLENS_WEB_PORT:-8080}
      VARLENS_LOG_LEVEL: ${VARLENS_LOG_LEVEL:-info}
      # Optional one-shot bootstrap. If all three are set on first boot
      # and no admin exists, the app creates an Argon2 admin and writes
      # /data/admin-recovery-key.txt (mode 0600). Capture and delete on
      # the host, then unset these in compose/.env to avoid leaving the
      # plaintext password in the container env.
      VARLENS_ADMIN_USERNAME: ${VARLENS_ADMIN_USERNAME-}
      VARLENS_ADMIN_PASSWORD: ${VARLENS_ADMIN_PASSWORD-}
      VARLENS_ADMIN_DISPLAY_NAME: ${VARLENS_ADMIN_DISPLAY_NAME-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The image's own HEALTHCHECK uses the same probe; this duplicate
      # gives Compose visibility into health state from the host side.
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - varlens

  # PostgreSQL — mandatory backend for the web variant (Phase 2).
  # The `profiles: [postgres]` gate from Stage 1.5 was dropped: the
  # service is now part of the default profile so `docker compose up`
  # without operator env vars works, and the varlens depends_on is
  # well-formed without requiring COMPOSE_PROFILES=postgres.
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    container_name: postgres
    restart: unless-stopped
    # Bound to localhost only - the application container connects via the
    # internal varlens network, no external access.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-varlens}
      POSTGRES_USER: ${POSTGRES_USER:-varlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in compose/.env - see docs/database.md}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - varlens

networks:
  varlens:
    name: varlens
