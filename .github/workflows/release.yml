name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --linux --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/*
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/*
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm run rebuild:node

      - name: Run tests
        run: npm run test

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload unsigned artifacts for signing
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v6
        with:
          name: windows-unsigned
          path: release/*.exe
          if-no-files-found: error

      - name: Sign with SignPath
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'varlens'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'release-signed'

      - name: Upload signed executables to release
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: svenstaro/upload-release-action@v2
        with:
          file: release-signed/*.exe
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload remaining artifacts to release
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/!(*.exe)
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all artifacts to release (unsigned)
        if: vars.SIGNPATH_ORGANIZATION_ID == ''
        uses: svenstaro/upload-release-action@v2
        with:
          file: release/*
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}
