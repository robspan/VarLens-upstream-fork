# Concept Pilot Compose stack.
# Currently: reverse proxy + monitoring tools.
# Still to come: application container and database container.

services:
  caddy:
    # Image pinned by digest (contract §vertrag2.3 reproducibility). Update via:
    #   docker pull caddy:2-alpine && docker inspect --format='{{index .RepoDigests 0}}' caddy:2-alpine
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/data/caddy/data:/data
      - /mnt/data/caddy/config:/config
    environment:
      # Hostname or IP used as the Caddy site address. Injected into .env
      # at deploy time (see make stack-up).
      SERVER_HOST: ${SERVER_HOST:-localhost}
      # TLS profile snippet name (defined in the Caddyfile):
      #   tls-internal    self-signed via Caddy's internal CA
      #   tls-le-classic  Let's Encrypt 90-day cert (requires real domain)
      #   tls-le-ip       Let's Encrypt 7-day shortlived cert for raw IPs
      CADDY_TLS_PROFILE: ${CADDY_TLS_PROFILE-tls-le-ip}
    networks:
      - varlens
    healthcheck:
      # /healthz is a redirect-exempt 200 endpoint defined in the Caddyfile
      # specifically for this probe. BusyBox wget in caddy:2-alpine has no
      # --max-redirect option, so a redirect-following probe of / would
      # fail at SNI/cert. /healthz keeps the probe trivial.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: uptime-kuma
    restart: unless-stopped
    # Bound to localhost only. External access exclusively via the Caddy reverse proxy.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /mnt/data/uptime-kuma:/app/data
    networks:
      - varlens

  dozzle:
    image: amir20/dozzle:latest@sha256:bb7df69b177814466e01397f5d44baabb56dc2fe9c6f7f18b61ce137428452d2
    container_name: dozzle
    restart: unless-stopped
    # Bound to localhost only. External access exclusively via the Caddy reverse proxy with auth.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      # Sub-path mount behind Caddy at /logs. Ensures Dozzle emits UI assets
      # correctly under /logs/... rather than absolutely under /.
      DOZZLE_BASE: /logs
      # Auth layer is handled by Caddy (basic auth in Caddyfile). Dozzle's own
      # auth stays disabled because it either requires a users.yml or returns
      # 502 on default settings.
    networks:
      - varlens

  # PostgreSQL as an optional service behind the "postgres" profile.
  # Enable with `COMPOSE_PROFILES=postgres docker compose up -d` or via Makefile:
  #   make stack-up DB=postgres
  # The default DB is SQLite - in that case no DB container is started and the
  # application opens a SQLite file under /mnt/data/app/ instead.
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    container_name: postgres
    restart: unless-stopped
    profiles: [postgres]
    # Bound to localhost only - the application container connects via the
    # internal varlens network, no external access.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-varlens}
      POSTGRES_USER: ${POSTGRES_USER:-varlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in compose/.env - see docs/database.md}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - varlens

networks:
  varlens:
    name: varlens
