#cloud-config
# First-boot bootstrap for the Concept Pilot.
# Rendered by OpenTofu via templatefile; variables come from the Tofu invocation:
#   ${deploy_user}  - name of the sudo user that gets created.
#   ${ssh_pubkey}   - SSH key installed for root and the deploy user.
#   ${volume_id}    - Hetzner volume ID, resolved to /dev/disk/by-id/scsi-0HC_Volume_<id>.

timezone: Europe/Berlin
locale: de_DE.UTF-8

# Install default packages. Docker and the Compose plugin come from the official Docker repository.
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - unattended-upgrades
  - apt-listchanges
  - htop
  - vim
  - tmux
  - git
  - age
  - bzip2  # for restic tarball extraction

# Create sudo user with SSH key, disable root login.
# The docker group is added in runcmd because it does not yet exist
# at user creation time (Docker is installed later in runcmd).
users:
  - name: ${deploy_user}
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_pubkey}

# Harden SSH.
write_files:
  - path: /etc/ssh/sshd_config.d/10-konzept.conf
    permissions: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      AllowUsers ${deploy_user}

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    permissions: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "$${distro_id}:$${distro_codename}-security";
          "$${distro_id}:$${distro_codename}-updates";
      };
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:30";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

  # restic backup: example configuration. The maintainer copies this to env and fills in
  # real Hetzner Object Storage credentials and a strong restic password.
  - path: /etc/restic/env.example
    permissions: "0600"
    content: |
      RESTIC_REPOSITORY=s3:s3.eu-central-003.hetznerobjects.com/varlens-pilot-backup
      RESTIC_PASSWORD=REPLACE_WITH_OPENSSL_RAND_BASE64_32
      AWS_ACCESS_KEY_ID=REPLACE_WITH_HETZNER_S3_ACCESS_KEY
      AWS_SECRET_ACCESS_KEY=REPLACE_WITH_HETZNER_S3_SECRET_KEY
      HEARTBEAT_URL=
      BACKUP_PATHS=/mnt/data
      RETENTION_KEEP_DAILY=7
      RETENTION_KEEP_WEEKLY=4
      RETENTION_KEEP_MONTHLY=6

  - path: /etc/systemd/system/restic-backup.service
    permissions: "0644"
    content: |
      [Unit]
      Description=restic backup to Hetzner Object Storage
      Wants=network-online.target
      After=network-online.target docker.service
      ConditionPathExists=/etc/restic/env
      ConditionPathIsMountPoint=/mnt/data

      [Service]
      Type=oneshot
      EnvironmentFile=/etc/restic/env
      ExecStart=/usr/local/bin/varlens-backup.sh
      User=root
      Nice=10
      IOSchedulingClass=best-effort
      IOSchedulingPriority=7

  - path: /etc/systemd/system/restic-backup.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Daily restic backup at 02:30
      Requires=restic-backup.service

      [Timer]
      OnCalendar=*-*-* 02:30:00
      Persistent=true
      RandomizedDelaySec=15min

      [Install]
      WantedBy=timers.target

# Formatting the data volume is handled by hcloud_volume.format = "ext4".
# Here we only define the fstab entry and mount point.
mounts:
  - ["/dev/disk/by-id/scsi-0HC_Volume_${volume_id}", "/mnt/data", "ext4", "discard,nofail,defaults", "0", "2"]

runcmd:
  # Defensively create directories for configuration written later.
  # /etc/restic is only populated with content by `setup-backup.py` - the
  # systemd unit has ConditionPathExists=/etc/restic/env and silently skips
  # until then. The directory itself should still exist.
  - install -m 0700 -d /etc/restic

  # Set up the official Docker repository and install the engine plus Compose plugin.
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Add the deploy user to the docker group (the group only exists after Docker is installed).
  - usermod -aG docker ${deploy_user}

  # SOPS and restic from GitHub releases (the Ubuntu repo versions are outdated).
  # SHA256 checksums are hardcoded for supply-chain verification. Update on version bump.
  - |
    SOPS_VERSION=v3.9.0
    SOPS_SHA256=0d65660fbe785647ff4f1764d7f69edf598f79d6d79ebbef4a501909b6ff6b82
    curl -fsSL "https://github.com/getsops/sops/releases/download/$${SOPS_VERSION}/sops-$${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
    echo "$${SOPS_SHA256}  /usr/local/bin/sops" | sha256sum -c - || { echo "FAIL: SOPS sha256 mismatch"; rm -f /usr/local/bin/sops; exit 1; }
    chmod +x /usr/local/bin/sops
  - |
    RESTIC_VERSION=0.17.1
    RESTIC_SHA256=bdfaf16fe933136e3057e64e28624f2e0451dbd47e23badb2d37dbb60fdb6a70
    curl -fsSL "https://github.com/restic/restic/releases/download/v$${RESTIC_VERSION}/restic_$${RESTIC_VERSION}_linux_amd64.bz2" -o /tmp/restic.bz2
    echo "$${RESTIC_SHA256}  /tmp/restic.bz2" | sha256sum -c - || { echo "FAIL: restic sha256 mismatch"; rm -f /tmp/restic.bz2; exit 1; }
    bunzip2 -c /tmp/restic.bz2 > /usr/local/bin/restic
    rm -f /tmp/restic.bz2
    chmod +x /usr/local/bin/restic

  # Directories for the Compose stack components on the data volume.
  - mkdir -p /mnt/data/postgres /mnt/data/caddy /mnt/data/app /mnt/data/backup
  - chown -R ${deploy_user}:${deploy_user} /mnt/data

  # Install the backup script. Placed in /usr/local/bin and invoked by the systemd service.
  - |
    cat > /usr/local/bin/varlens-backup.sh <<'BACKUP_SCRIPT'
    #!/usr/bin/env bash
    # Invoked by /etc/systemd/system/restic-backup.service.
    # See scripts/backup.sh in the repository for the full implementation - this
    # script is a slimmed-down clone with the essential steps. For more mature
    # logging and heartbeat handling, see the repository script.
    set -euo pipefail
    # Guard against silent data loss: if /mnt/data is not mounted (e.g. volume attach
    # failed, mount uses nofail), restic would back up an empty directory and
    # `restic forget --prune` would rotate away valid snapshots. Hard-abort instead.
    mountpoint -q /mnt/data || { echo "FAIL: /mnt/data is not mounted"; exit 1; }
    : "$${RESTIC_REPOSITORY:?RESTIC_REPOSITORY must be set}"
    : "$${RESTIC_PASSWORD:?RESTIC_PASSWORD must be set}"
    : "$${BACKUP_PATHS:=/mnt/data}"
    : "$${RETENTION_KEEP_DAILY:=7}"
    : "$${RETENTION_KEEP_WEEKLY:=4}"
    : "$${RETENTION_KEEP_MONTHLY:=6}"
    if ! restic snapshots --no-lock --json >/dev/null 2>&1; then
        restic init
    fi
    restic backup $$BACKUP_PATHS --tag auto --tag "$$(date +%Y-%m-%d)"
    restic forget --keep-daily "$$RETENTION_KEEP_DAILY" --keep-weekly "$$RETENTION_KEEP_WEEKLY" --keep-monthly "$$RETENTION_KEEP_MONTHLY" --prune || true
    if [ -n "$${HEARTBEAT_URL:-}" ]; then
        curl -fsS --max-time 10 --retry 3 "$$HEARTBEAT_URL" >/dev/null || true
    fi
    BACKUP_SCRIPT
    chmod 0755 /usr/local/bin/varlens-backup.sh

  # Enable the systemd timer (the service only starts once /etc/restic/env has been
  # created by the maintainer - otherwise ConditionPathExists skips it).
  - systemctl daemon-reload
  - systemctl enable --now restic-backup.timer

  # UFW: allow SSH, HTTP, HTTPS. The Hetzner Cloud Firewall is redundant but adds defense in depth.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Restart sshd and unattended-upgrades.
  - systemctl restart ssh
  - systemctl enable --now unattended-upgrades

# Machine-readable bootstrap-done signal.
# $$UPTIME (double dollar) escapes Tofu templatefile so cloud-init resolves it at runtime.
final_message: "cloud-init bootstrap finished after $$UPTIME seconds. Log in as ${deploy_user}."
