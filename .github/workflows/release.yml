name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Belt-and-suspenders gate: refuse to release a tag whose SHA didn't
      # pass build.yml. Branch protection already blocks merges on failing
      # CI, but direct tag pushes bypass branch protection — this catches
      # that case before any OS builder spins up and wastes runner minutes.
      # Tags don't trigger build.yml (it only runs on push-to-main and PRs),
      # so we look up the latest build.yml run on the exact tagged commit.
      #
      # IMPORTANT: annotated tags (`git tag -a`) have their own tag object;
      # `git rev-parse v0.55.0` returns that tag object's SHA, not the commit
      # it points to. Use `${GITHUB_SHA}` (which Actions always sets to the
      # underlying commit SHA for tag pushes) so the lookup hits the actual
      # build.yml run that CI executed. Previous bug: released 0.55.0 failed
      # with "got: missing" because `gh run list --commit=<tag-object-sha>`
      # returned an empty array.
      - name: Verify build.yml passed on tagged SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${GITHUB_SHA}"
          STATUS=$(gh run list --workflow=build.yml --commit="$SHA" \
            --json conclusion --jq '.[0].conclusion // "missing"')
          if [ "$STATUS" != "success" ]; then
            echo "::error::build.yml did not succeed on $SHA (got: $STATUS)"
            echo "::error::Refusing to release a tag whose CI did not pass."
            exit 1
          fi
          echo "build.yml passed on $SHA — proceeding with release"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > release_notes.md
            echo "" >> release_notes.md
            git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges \
              | grep -v "Co-Authored-By" >> release_notes.md || true
          else
            echo "Initial release" > release_notes.md
          fi

      - name: Create draft release
        id: create
        run: |
          BODY=$(cat release_notes.md)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="${{ github.ref_name }}" \
            -f body="$BODY" \
            -F draft=true \
            -F prerelease=false \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    name: Release (Linux)
    needs: [create-release, secrets-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential

      - name: Install dependencies
        run: npm ci

      # lint/typecheck/test are validated by build.yml on the tagged SHA
      # before the tag is pushed. The create-release gate above refuses to
      # proceed when build.yml didn't succeed, so re-running those checks
      # here would be pure duplication.

      # Cache the Electron-ABI native binary. Key must include runner.os,
      # runner.arch, the exact Electron version spec from package.json, and
      # the lockfile hash — a partial match would leave a wrong-ABI `.node`
      # on disk and silently corrupt the build. No restore-keys fallback
      # for the same reason.
      - name: Extract Electron version
        id: electron-ver
        shell: bash
        run: echo "ver=$(node -p 'require("./package.json").devDependencies.electron')" >> "$GITHUB_OUTPUT"

      - name: Cache native module for Electron ABI
        id: native-cache
        uses: actions/cache@v5
        with:
          path: node_modules/better-sqlite3-multiple-ciphers/build/Release
          key: native-electron-${{ runner.os }}-${{ runner.arch }}-${{ steps.electron-ver.outputs.ver }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --linux --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  release-macos:
    name: Release (macOS)
    needs: [create-release, secrets-scan]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # lint/typecheck/test already validated by build.yml on the tagged SHA.

      - name: Extract Electron version
        id: electron-ver
        shell: bash
        run: echo "ver=$(node -p 'require("./package.json").devDependencies.electron')" >> "$GITHUB_OUTPUT"

      - name: Cache native module for Electron ABI
        id: native-cache
        uses: actions/cache@v5
        with:
          path: node_modules/better-sqlite3-multiple-ciphers/build/Release
          key: native-electron-${{ runner.os }}-${{ runner.arch }}-${{ steps.electron-ver.outputs.ver }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  release-windows:
    name: Release (Windows)
    needs: [create-release, secrets-scan]
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # lint/typecheck/test already validated by build.yml on the tagged SHA.

      - name: Extract Electron version
        id: electron-ver
        shell: bash
        run: echo "ver=$(node -p 'require("./package.json").devDependencies.electron')" >> "$GITHUB_OUTPUT"

      - name: Cache native module for Electron ABI
        id: native-cache
        uses: actions/cache@v5
        with:
          path: node_modules/better-sqlite3-multiple-ciphers/build/Release
          key: native-electron-${{ runner.os }}-${{ runner.arch }}-${{ steps.electron-ver.outputs.ver }}-${{ hashFiles('package-lock.json') }}

      - name: Rebuild native modules for Electron
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: npm run rebuild:electron

      - name: Build
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # --- SSL.com eSigner Code Signing (Windows) ---
      # Uses CodeSignTool v1.3.2 jar directly (not the buggy GitHub Action).
      # batch_sign signs all files with a single OTP, avoiding TOTP replay.
      # Gated on ESIGNER_ENABLED variable to conserve signing quota (20/month).

      - name: Log signing quota usage
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          $filesToSign = @("Varlens-Setup-${version}.exe", "Varlens-Portable-${version}.exe")
          $found = ($filesToSign | Where-Object { Test-Path (Join-Path "release" $_) }).Count
          Write-Host "::notice::Code signing: will sign $found of $($filesToSign.Count) files (monthly quota: 20 operations)"

      - name: Setup Java for CodeSignTool
        if: vars.ESIGNER_ENABLED == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '11'

      - name: Download and configure CodeSignTool
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          $csVersion = "v1.3.2"
          $url = "https://github.com/SSLcom/CodeSignTool/releases/download/$csVersion/CodeSignTool-$csVersion-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile codesigntool.zip
          Expand-Archive -Path codesigntool.zip -DestinationPath codesigntool -Force
          # Zip extracts flat: codesigntool/jar/, codesigntool/conf/, etc.
          # Find the root by locating the jar file
          $jarFile = Get-ChildItem codesigntool -Recurse -Filter "code_sign_tool-*.jar" | Select-Object -First 1
          if (-not $jarFile) { throw "CodeSignTool jar not found after extraction" }
          # The CodeSignTool root is two levels up from jar/code_sign_tool-*.jar
          $cstDir = (Split-Path (Split-Path $jarFile.FullName))
          # Write production config (CodeSignTool reads ./conf/ relative to CWD)
          $conf = Join-Path $cstDir "conf" "code_sign_tool.properties"
          $content = "CLIENT_ID=kaXTRACNijSWsFdRKg_KAfD3fqrBlzMbWs6TwWHwAn8`nOAUTH2_ENDPOINT=https://login.ssl.com/oauth2/token`nCSC_API_ENDPOINT=https://cs.ssl.com`nTSA_URL=http://ts.ssl.com`nTSA_LEGACY_URL=http://ts.ssl.com/legacy"
          Set-Content $conf $content -NoNewline
          Write-Host "CodeSignTool dir: $cstDir"
          Write-Host "Jar: $($jarFile.FullName)"
          Write-Host "Config: $conf"
          Get-Content $conf
          # Verify structure
          Get-ChildItem $cstDir -Exclude __MACOSX | Format-Table Name, Mode
          # Export for next steps
          echo "CST_DIR=$cstDir" >> $env:GITHUB_ENV
          echo "CST_JAR=$($jarFile.FullName)" >> $env:GITHUB_ENV

      - name: Sign Windows installer with CodeSignTool
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          $cstDir = $env:CST_DIR
          $jarPath = $env:CST_JAR
          $username = "${{ secrets.ES_USERNAME }}".Trim()
          $password = "${{ secrets.ES_PASSWORD }}".Trim()
          $credId = "${{ secrets.ES_CREDENTIAL_ID }}".Trim()
          $totpSecret = "${{ secrets.ES_TOTP_SECRET }}".Trim()
          $workspace = $env:GITHUB_WORKSPACE

          Write-Host "Jar: $jarPath"
          Write-Host "CWD: $cstDir"
          Write-Host "Conf exists: $(Test-Path (Join-Path $cstDir 'conf/code_sign_tool.properties'))"

          # Sign both installer and portable exe files
          $filesToSign = @(
            "Varlens-Setup-${version}.exe",
            "Varlens-Portable-${version}.exe"
          )

          # CodeSignTool reads ./conf/code_sign_tool.properties relative to CWD
          Push-Location $cstDir
          foreach ($fileName in $filesToSign) {
            $filePath = Join-Path $workspace "release" $fileName
            if (-not (Test-Path $filePath)) {
              Write-Host "::warning::$fileName not found, skipping"
              continue
            }
            Write-Host "Signing $fileName ..."
            java -jar $jarPath sign `
              -username="$username" `
              -password="$password" `
              -credential_id="$credId" `
              -totp_secret="$totpSecret" `
              -input_file_path="$filePath" `
              -override
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning::First attempt failed, retrying after 31s..."
              Start-Sleep -Seconds 31
              java -jar $jarPath sign `
                -username="$username" `
                -password="$password" `
                -credential_id="$credId" `
                -totp_secret="$totpSecret" `
                -input_file_path="$filePath" `
                -override
              if ($LASTEXITCODE -ne 0) { throw "Code signing failed for $fileName after retry" }
            }
            Write-Host "Successfully signed $fileName"
          }
          Pop-Location

      - name: Regenerate latest.yml with signed artifact hashes
        if: vars.ESIGNER_ENABLED == 'true'
        shell: pwsh
        run: |
          $yml = Get-Content release/latest.yml -Raw
          foreach ($exe in Get-ChildItem release/*.exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
            $b64 = [Convert]::ToBase64String([byte[]] -split ($hash -replace '..', '0x$& '))
            $size = $exe.Length
            $name = $exe.Name
            # Update per-file entries in the files array (use "url:" key)
            $yml = $yml -replace "(?<=url: $([regex]::Escape($name))\s*\n\s*sha512: )\S+", $b64
            $yml = $yml -replace "(?<=url: $([regex]::Escape($name))\s*\n\s*sha512: \S+\s*\n\s*size: )\d+", $size
            # Update top-level entry (uses "path:" key)
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: )\S+", $b64
            $yml = $yml -replace "(?<=path: $([regex]::Escape($name))\s*\n\s*sha512: \S+\s*\n\s*size: )\d+", $size
          }
          Set-Content release/latest.yml $yml -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.zip
            release/latest.yml

  publish-release:
    name: Publish Release
    needs: [create-release, release-linux, release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      # Single `gh release upload` call instead of a shell for-loop —
      # `gh` parallelises internally and a single invocation also avoids
      # N separate auth handshakes.
      - name: Upload all assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" artifacts/* --clobber

      - name: Publish draft release and mark as latest
        run: |
          gh api -X PATCH repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
            -F draft=false \
            -F make_latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
